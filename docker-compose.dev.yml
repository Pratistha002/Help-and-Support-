# Dev override — hot reload with local source mounted
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    command: npm run dev
    environment:
      NODE_ENV: development
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules

volumes:
  web_node_modules:
