services:

  # Local-only Mongo — optional when SaarthiX stack is not running (profile: isolated).
  mongodb:
    profiles: ["isolated"]
    image: mongo:4.4
    container_name: help-support-mongo
    restart: unless-stopped
    ports:
      - "27019:27017"
    volumes:
      - help_support_mongo:/data/db
    networks:
      - default
      - saarthix-network
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPPORT_EMAIL: ${NEXT_PUBLIC_SUPPORT_EMAIL:-Saarthiworkforce@gmail.com}
        NEXT_PUBLIC_SUPPORT_PHONE_DISPLAY: ${NEXT_PUBLIC_SUPPORT_PHONE_DISPLAY:-+1 878 732 2485}
        NEXT_PUBLIC_SUPPORT_PHONE_E164: ${NEXT_PUBLIC_SUPPORT_PHONE_E164:-+18787322485}
        NEXT_PUBLIC_WORKFORCE_APP_URL: ${NEXT_PUBLIC_WORKFORCE_APP_URL:-http://localhost:3002}
        NEXT_PUBLIC_SAARTHIX_URL: ${NEXT_PUBLIC_SAARTHIX_URL:-https://saarthix.com}
        NEXT_PUBLIC_INTERVIEWX_ORIGIN: ${NEXT_PUBLIC_INTERVIEWX_ORIGIN:-}
        NEXT_PUBLIC_HELP_SUPPORT_URL: ${NEXT_PUBLIC_HELP_SUPPORT_URL:-}
    container_name: help-support-web
    restart: unless-stopped
    ports:
      - "3003:3003"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      # SaarthiWorkforce Help & Support — dedicated DB (NOT shared with SaarthiX `saarthix_support`).
      MONGODB_URI: mongodb://somethingx-mongodb:27017/saarthi_workforce_support
      SUPPORT_MONGODB_DATABASE: ""
      # JWT secrets come from env_file (.env) — do NOT override with empty ${JWT_SECRET:-}
      HELP_AGENT_PASSWORD: ${HELP_AGENT_PASSWORD:-Help@221716}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://localhost:3003}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3002,http://localhost:3003}
      # Server-side SSO: validate workforce tokens via TalentX (host machine from Docker)
      WORKFORCE_API_INTERNAL_URL: ${WORKFORCE_API_INTERNAL_URL:-http://host.docker.internal:3002}
      NEXT_PUBLIC_WORKFORCE_APP_URL: ${NEXT_PUBLIC_WORKFORCE_APP_URL:-http://localhost:3002}
      # Brevo + Twilio — loaded from env_file (.env); listed here for visibility
      MAIL_PROVIDER: ${MAIL_PROVIDER:-brevo}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      BREVO_SMTP_LOGIN: ${BREVO_SMTP_LOGIN:-}
      BREVO_SMTP_USER: ${BREVO_SMTP_USER:-}
      BREVO_SMTP_KEY: ${BREVO_SMTP_KEY:-}
      APP_MAIL_FROM: ${APP_MAIL_FROM:-}
      SUPPORT_EMAIL_TO: ${SUPPORT_EMAIL_TO:-}
      NEXT_PUBLIC_SUPPORT_EMAIL: ${NEXT_PUBLIC_SUPPORT_EMAIL:-Saarthiworkforce@gmail.com}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      TWILIO_API_KEY: ${TWILIO_API_KEY:-}
      TWILIO_API_SECRET: ${TWILIO_API_SECRET:-}
      SUPPORT_WEBHOOK_BASE_URL: ${SUPPORT_WEBHOOK_BASE_URL:-}
    networks:
      - default
      - saarthix-network
    depends_on:
      mongodb:
        condition: service_healthy
        required: false

networks:
  saarthix-network:
    external: true
    name: somethingx_saarthix-network

volumes:
  help_support_mongo:

